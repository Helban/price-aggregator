<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Aggregator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700&family=Rubik:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --radius: 12px;
      --font-body: 'Nunito Sans', system-ui, -apple-system, "Segoe UI", sans-serif;
      --font-heading: 'Rubik', system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .panel {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border-radius: 20px;
      padding: 44px 40px 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: #eff6ff;
      border-radius: 14px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    h1 {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
    }
    h1 em { font-style: normal; color: var(--accent); }

    .subtitle {
      color: var(--muted);
      margin-top: 8px;
      font-size: 0.95rem;
      line-height: 1.55;
    }

    .source-chips {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .source-chip {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .source-chip.ceneo       { background: #dbeafe; color: #1d4ed8; }
    .source-chip.olx         { background: #d1fae5; color: #065f46; }
    .source-chip.sprzedajemy { background: #dcfce7; color: #15803d; }

    .search-wrap { display: flex; gap: 8px; margin-top: 28px; }
    #query {
      flex: 1;
      padding: 13px 16px;
      font-size: 1rem;
      font-family: var(--font-body);
      border: 1.5px solid #e4e4e7;
      border-radius: var(--radius);
      background: #fafafa;
      transition: border-color .12s, box-shadow .12s, background .12s;
    }
    #query:focus {
      outline: none;
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    #query::placeholder { color: #a1a1aa; }

    .btn-search {
      padding: 13px 24px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--font-body);
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: background .12s, transform .1s, box-shadow .12s;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
    }
    .btn-search:hover { background: var(--accent-dark); box-shadow: 0 4px 12px rgba(37,99,235,.4); }
    .btn-search:active { transform: scale(.97); }
    .btn-search:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e4e4e7;
    }

    .dropzone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding: 24px 20px;
      text-align: center;
      border: 2px dashed #e4e4e7;
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 0.875rem;
      cursor: pointer;
      transition: border-color .12s, background .12s;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: #f0f5ff;
      color: var(--accent);
    }
    .dropzone-icon { color: #a1a1aa; transition: color .12s; }
    .dropzone:hover .dropzone-icon, .dropzone.dragover .dropzone-icon { color: var(--accent); }
    .dropzone strong { color: var(--text); font-weight: 700; }
    .dropzone kbd {
      font-family: ui-monospace, monospace;
      background: #f4f4f5;
      border: 1px solid #d4d4d8;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.78rem;
    }
    .dropzone input[type="file"] { display: none; }

    #status { margin-top: 14px; font-size: 0.875rem; min-height: 1.2em; text-align: center; }
    #status.error { color: #dc2626; }
    #status.info  { color: var(--muted); }
    #status.ok    { color: #16a34a; }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(4px);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    .loading-overlay.active { display: flex; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e4e4e7;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    .loading-overlay p { font-size: 0.9rem; color: var(--muted); }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; opacity: .5; }
      .btn-search, .dropzone, #query { transition: none; }
    }

    @media (max-width: 480px) {
      .panel { padding: 32px 24px 28px; }
      h1 { font-size: 1.65rem; }
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loading-overlay" role="status" aria-label="Searching…">
    <div class="spinner"></div>
    <p>Searching…</p>
  </div>

  <div class="panel">
    <div class="logo-mark" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        <line x1="7" y1="7" x2="7.01" y2="7"/>
      </svg>
    </div>

    <h1>Price <em>Aggregator</em></h1>
    <p class="subtitle">Compare prices in one place. No account needed, no ads.</p>

    <div class="source-chips" aria-label="Searched stores">
      <span class="source-chip ceneo">Ceneo</span>
      <span class="source-chip olx">OLX</span>
      <span class="source-chip sprzedajemy">Sprzedajemy</span>
    </div>

    <form action="/search" method="get" id="search-form">
      <div class="search-wrap">
        <input type="text" name="q" id="query" placeholder="e.g. laptop lenovo thinkpad" autofocus autocomplete="off" aria-label="Search query">
        <button type="submit" class="btn-search">Search</button>
      </div>
    </form>

    <div class="divider">or</div>

    <label class="dropzone" id="dropzone">
      <div class="dropzone-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <div>
        <strong>Search by image</strong><br>
        Paste (<kbd>Ctrl</kbd>+<kbd>V</kbd>), drag &amp; drop, or click to browse
      </div>
      <input type="file" id="file-input" accept="image/*">
    </label>

    <div id="status" role="status" aria-live="polite"></div>
  </div>

  <script>
    const queryInput = document.getElementById('query');
    const dropzone   = document.getElementById('dropzone');
    const fileInput  = document.getElementById('file-input');
    const statusEl   = document.getElementById('status');
    const overlay    = document.getElementById('loading-overlay');

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = kind || '';
    }

    document.getElementById('search-form').addEventListener('submit', function() {
      if (queryInput.value.trim()) overlay.classList.add('active');
    });

    // Send an image to the backend, then put the detected phrase into the
    // search box and focus it — the user reviews and presses Enter.
    async function resolveImage(blob) {
      if (!blob || !blob.type.startsWith('image/')) {
        setStatus('That does not look like an image.', 'error');
        return;
      }
      setStatus('Analysing image…', 'info');
      const form = new FormData();
      form.append('file', blob, blob.name || 'pasted.png');

      try {
        const resp = await fetch('/resolve-image', { method: 'POST', body: form });
        const data = await resp.json();
        if (!resp.ok) {
          setStatus(data.error || 'Something went wrong.', 'error');
          return;
        }
        if (!data.query) {
          setStatus('Could not recognise the product — please type your query manually.', 'info');
          queryInput.focus();
          return;
        }
        queryInput.value = data.query;
        queryInput.focus();
        queryInput.select();
        setStatus('Detected: "' + data.query + '" — edit if needed, then press Enter.', 'ok');
      } catch (e) {
        setStatus('Connection error. Please try again.', 'error');
      }
    }

    // Paste anywhere on the page (Ctrl+V).
    window.addEventListener('paste', (e) => {
      const item = [...(e.clipboardData?.items || [])].find(i => i.type.startsWith('image/'));
      if (item) { e.preventDefault(); resolveImage(item.getAsFile()); }
    });

    // Drag & drop onto the zone.
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      resolveImage(e.dataTransfer.files[0]);
    });

    // Click-to-pick fallback.
    fileInput.addEventListener('change', () => resolveImage(fileInput.files[0]));
  </script>
</body>
</html>
